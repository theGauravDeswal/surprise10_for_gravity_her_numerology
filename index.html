<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Georgia', serif;
    overflow: hidden;
}

/* 🌌 Stars */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    animation: moveStars 60s linear infinite;
}
@keyframes moveStars {
    from {background-position: 0 0;}
    to {background-position: 1000px 1000px;}
}

/* 🌸 Pink aura */
.pink {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,182,193,0.18), transparent);
    opacity: 0;
    transition: opacity 2s;
}

/* ✨ Particles */
.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    opacity: 0.7;
    animation: float 12s infinite ease-in-out;
}
@keyframes float {
    0% { transform: translate(0,0);}
    50% { transform: translate(80px,-120px);}
    100% { transform: translate(0,0);}
}

/* 🎬 Text */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    width: 85%;
    text-align: center;
}

.line {
    opacity: 0;
    transform: translateY(20px);
    transition: all 1.5s ease;
    font-size: 24px;
    margin: 20px 0;
}

.show {
    opacity: 1;
    transform: translateY(0);
}

.fade-out {
    opacity: 0 !important;
}

/* Titles */
.title {
    font-size: 34px;
    font-weight: bold;
}

.subtitle {
    font-size: 20px;
    opacity: 0.8;
    font-style: italic;
}

/* Final highlight */
.highlight {
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 20px white;
}

/* Controls */
.controls {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
}

button {
    padding: 8px 14px;
    margin: 5px;
    border-radius: 20px;
    border: none;
    background: white;
    color: black;
}

.progress {
    width: 80%;
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="pink" id="pink"></div>

<div class="particle" style="top:40%; left:30%;"></div>
<div class="particle" style="top:60%; left:70%; animation-delay:4s;"></div>
<div class="particle" style="top:50%; left:50%; animation-delay:2s;"></div>

<div class="container">
    <div id="intro">
        <div class="line" id="t1">Some people are understood in conversations…</div>
        <div class="line" id="t2">Some… require silence to be heard.</div>
        <div class="line" id="t3">This is not just a reading.</div>
        <div class="line" id="t4">This is you… seen.</div>
        <button onclick="start()">Play</button>
    </div>

    <div id="main"></div>
</div>

<div class="controls" id="controls" style="display:none;">
    <button onclick="toggle()">Pause</button>
    <button onclick="seek(-10)">⏪ 10s</button>
    <button onclick="seek(10)">⏩ 10s</button>
    <br>
    <input type="range" id="progress" class="progress" value="0">
</div>

<audio id="audio" src="voice.mp3"></audio>

<script>
let audio = document.getElementById("audio");
let main = document.getElementById("main");
let progress = document.getElementById("progress");
let isDragging = false;

let script = [

{time: 5, text: "To Jayanti", type:"title"},
{time: 10, text: "(Gravity… the cosmic attraction)", type:"subtitle"},

{time: 20, text: "Some girls don’t need attention…"},
{time: 26, text: "they need presence."},

{time: 40, text: "Not noise…"},
{time: 46, text: "not constant talking…"},
{time: 52, text: "just someone who actually feels them."},

{time: 120, text: "Because when a woman feels deeply…"},
{time: 130, text: "everything inside her is louder."},

{time: 200, text: "A woman like that…", pink:true},
{time: 210, text: "wants to feel held…", pink:true},
{time: 220, text: "understood…", pink:true},
{time: 230, text: "desired… without asking.", pink:true},

{time: 320, text: "She doesn’t chase…"},
{time: 330, text: "but she responds to consistency."},

{time: 420, text: "She can be soft…"},
{time: 430, text: "and still have a fire inside her…"},

{time: 520, text: "She doesn’t just want attention…"},
{time: 530, text: "she wants to feel wanted."},

{time: 700, text: "Because the right presence…"},
{time: 710, text: "doesn’t make her overthink."},

{time: 820, text: "It makes her feel calm…"},
{time: 830, text: "even in her intensity."},

{time: 950, text: "And when she meets someone…"},
{time: 960, text: "who understands that balance…"},

{time: 1100, text: "something in her softens again."},

{time: 1250, text: "She doesn’t need to be changed…"},
{time: 1260, text: "or simplified."},

{time: 1400, text: "She just needs to be met…"},
{time: 1410, text: "fully."},

{time: 1550, text: "And when that happens…"},
{time: 1560, text: "she gives a version of herself…"},
{time: 1570, text: "that very few ever get to see."},

{time: 1700, text: "The right man doesn’t try to control her…"},
{time: 1710, text: "he understands her… and chooses her… exactly as she is.", highlight:true}

];

let shown = [];

function start() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("controls").style.display = "block";
    audio.play();

    audio.ontimeupdate = () => {
        let current = audio.currentTime;

        script.forEach((line, i) => {
            if (current >= line.time && !shown[i]) {

                let el = document.createElement("div");
                el.className = "line";
                el.innerText = line.text;

                if (line.type === "title") el.classList.add("title");
                if (line.type === "subtitle") el.classList.add("subtitle");
                if (line.highlight) el.classList.add("highlight");

                main.appendChild(el);
                setTimeout(() => el.classList.add("show"), 100);

                if (main.children.length > 4) {
                    main.children[0].classList.add("fade-out");
                    setTimeout(() => {
                        if(main.children[0]) main.removeChild(main.children[0]);
                    }, 1500);
                }

                if (line.pink) {
                    document.getElementById("pink").style.opacity = 1;
                }

                shown[i] = true;
            }
        });

        if (!isDragging) {
            progress.value = (current / audio.duration) * 100;
        }
    };
}

function toggle() {
    if (audio.paused) audio.play();
    else audio.pause();
}

function seek(sec) {
    audio.currentTime += sec;
}

progress.addEventListener("input", () => {
    isDragging = true;
});

progress.addEventListener("change", () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
    isDragging = false;
});

/* intro animation */
window.onload = () => {
    ["t1","t2","t3","t4"].forEach((id, i) => {
        setTimeout(() => {
            document.getElementById(id).classList.add("show");
        }, i * 2000);
    });
};
</script>

</body>
</html>
