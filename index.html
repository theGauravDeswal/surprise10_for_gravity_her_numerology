<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Georgia', serif;
    overflow: hidden;
}

/* Stars */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    animation: moveStars 60s linear infinite;
}
@keyframes moveStars {
    from {background-position: 0 0;}
    to {background-position: 1000px 1000px;}
}

/* Pink aura */
.pink {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,182,193,0.2), transparent);
    opacity: 0;
    transition: opacity 2s;
}

/* Fairy particle */
.fairy {
    position: absolute;
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 10px white;
    animation: float 12s infinite ease-in-out;
}
@keyframes float {
    0% { transform: translate(0,0);}
    50% { transform: translate(100px,-120px);}
    100% { transform: translate(0,0);}
}

/* Text */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    width: 85%;
    text-align: center;
}

.line {
    opacity: 0;
    transform: translateY(20px);
    transition: all 1.5s ease;
    font-size: 24px;
    margin: 20px 0;
}

.show {
    opacity: 1;
    transform: translateY(0);
}

/* Highlight line */
.highlight {
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 20px white;
    animation: glow 2s infinite alternate;
}
@keyframes glow {
    from {text-shadow: 0 0 10px white;}
    to {text-shadow: 0 0 30px white;}
}

/* Controls */
.controls {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
}
button {
    padding: 8px 14px;
    margin: 5px;
    border-radius: 20px;
    border: none;
    background: white;
    color: black;
}
.progress {
    width: 80%;
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="pink" id="pink"></div>

<!-- Fairy particles -->
<div class="fairy" style="top:40%; left:30%;"></div>
<div class="fairy" style="top:60%; left:70%; animation-delay:4s;"></div>

<div class="container">
    <div id="intro">
        <div class="line" id="t1">Some people are understood in conversations…</div>
        <div class="line" id="t2">Some… require silence to be heard.</div>
        <div class="line" id="t3">This is not just a reading.</div>
        <div class="line" id="t4">This is you… seen.</div>
        <button onclick="start()">Play</button>
    </div>

    <div id="main"></div>
</div>

<div class="controls" id="controls" style="display:none;">
    <button onclick="toggle()">Pause</button>
    <button onclick="seek(-10)">⏪ 10s</button>
    <button onclick="seek(10)">⏩ 10s</button>
    <br>
    <input type="range" id="progress" class="progress">
</div>

<audio id="audio" src="voice.mp3"></audio>
<audio id="heartbeat" src="heartbeat.mp3"></audio>

<script>
let audio = document.getElementById("audio");
let heartbeat = document.getElementById("heartbeat");
let main = document.getElementById("main");
let progress = document.getElementById("progress");

/* 🎯 TIMELINE */
let script = [
    {time: 5, text: "Jayanti"},
    {time: 10, text: "(Isha… the one who returns to softness)"},

    {time: 20, text: "You were never ‘too much’…"},
    {time: 26, text: "You were just deeply alive."},

    {time: 50, text: "There is a girl in you…", pink:true},
    {time: 60, text: "She didn’t disappear.", pink:true},
    {time: 65, text: "She just learned to settle for less.", pink:true},

    {time: 120, text: "You don’t break."},
    {time: 125, text: "You adapt."},
    {time: 130, text: "That’s rare."},

    {time: 200, text: "He chooses you in it.", highlight:true, heartbeat:true}
];

let shown = [];

function start() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("controls").style.display = "block";

    audio.play();

    audio.ontimeupdate = () => {
        let current = audio.currentTime;

        script.forEach((line, i) => {
            if (current >= line.time && !shown[i]) {

                let el = document.createElement("div");
                el.className = "line";
                el.innerText = line.text;

                if (line.highlight) el.classList.add("highlight");

                main.appendChild(el);

                setTimeout(() => el.classList.add("show"), 100);

                // remove older lines
                if (main.children.length > 4) {
                    main.removeChild(main.children[0]);
                }

                // pink aura
                if (line.pink) {
                    document.getElementById("pink").style.opacity = 1;
                }

                // heartbeat moment
                if (line.heartbeat) {
                    heartbeat.play();
                    document.body.style.transform = "scale(1.02)";
                    setTimeout(()=> {
                        document.body.style.transform = "scale(1)";
                    }, 300);
                }

                shown[i] = true;
            }
        });

        progress.value = (current / audio.duration) * 100;
    };
}

function toggle() {
    if (audio.paused) audio.play();
    else audio.pause();
}

function seek(sec) {
    audio.currentTime += sec;
}

progress.oninput = () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
};

/* intro */
window.onload = () => {
    ["t1","t2","t3","t4"].forEach((id, i) => {
        setTimeout(() => {
            document.getElementById(id).classList.add("show");
        }, i * 2000);
    });
};
</script>

</body>
</html>
